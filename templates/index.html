<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create One Piece Styled Bounty Poster</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Create Your bounty poster!</h1>
        <form action="/create-bounty" method="post">
            <div class="form-group">
                <label for="name">Pirate Name:</label>
                <input type="text" name="name" id="name" required placeholder="Monkey D. Luffy">
            </div>

            <div class="form-group">
                <label for="photo_url">Photo URL:</label>
                <input type="url" name="photo_url" id="photo_url" required placeholder="https://example.com/photo.jpg">
                <small>Enter a direct link to an image</small>
            </div>

            <button type="submit">Generate Bounty Poster</button>
        </form>
    </div>
</body>
</html>
